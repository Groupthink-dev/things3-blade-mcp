name: things3-blade-mcp
version: "0.1.1"
description: "Things 3 task management via AppleScript and URL scheme — macOS only"
author: piersdd
license: MIT
tier: certified
author_type: first-party
readiness: beta
homepage: https://github.com/Groupthink-dev/things3-blade-mcp
contract: tasks-v1

services:
  tasks:
    list: get_todos
    search: search_todos
    projects: get_projects
    today: get_today
    inbox: get_inbox
    tags: get_tags
    summary: get_summary
    logbook: get_logbook
    create: add_todo
    update: update_todo
    # complete maps to update_todo with completed: true
    complete: update_todo

setup:
  icon: "\u2705"
  blurb: "Access Things 3 tasks, projects, areas, and tags via AppleScript and URL scheme."
  auth_model: none
  complexity: trivial
  test:
    endpoint: "file://~/Library/Group Containers/JLMPQHK86H.com.culturedcode.ThingsMac/Things Database.thingsdatabase/main.sqlite"
    auth_style: none
  prerequisites:
    - "macOS only"
    - "Things 3 installed from Mac App Store"

install:
  runtime: uv
  package: things3-blade-mcp
  command: things3-blade-mcp
  # DD-242 Phase C: stdio-only. No HTTP mode shipped; the binary cannot bind a port.
  network_transport: []

env: []

requires:
  sidereal: ">=0.3.0"

conformance:
  required: "3/3"
  recommended: "4/4"
  optional: "1/1"
  last_tested: "2026-03-25"
